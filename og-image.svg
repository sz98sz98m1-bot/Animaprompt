<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080808"/>
      <stop offset="100%" stop-color="#0e0e0e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F7B731"/>
      <stop offset="100%" stop-color="#d4960f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F7B731" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#F7B731" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.06" stroke="#F7B731" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/>
  </g>

  <!-- Glow center -->
  <ellipse cx="600" cy="315" rx="400" ry="250" fill="url(#glow)" filter="url(#blur)"/>

  <!-- Border frame -->
  <rect x="24" y="24" width="1152" height="582" rx="20" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- Logo badge -->
  <rect x="80" y="64" width="180" height="36" rx="18" fill="rgba(247,183,49,0.1)" stroke="rgba(247,183,49,0.25)" stroke-width="1"/>
  <text x="170" y="87" font-family="'Roboto Mono', monospace" font-size="12" font-weight="700" fill="#F7B731" text-anchor="middle" letter-spacing="2">ANIMAPROMPT</text>

  <!-- Main title Arabic (RTL) -->
  <text x="600" y="230" font-family="'Reem Kufi', 'Arial', sans-serif" font-size="72" font-weight="700" fill="white" text-anchor="middle" direction="rtl">حوّل أفكارك إلى أفلام</text>
  <text x="600" y="320" font-family="'Reem Kufi', 'Arial', sans-serif" font-size="72" font-weight="700" fill="url(#gold)" text-anchor="middle" direction="rtl">كارتون باستخدام الـ AI</text>

  <!-- Subtitle -->
  <text x="600" y="390" font-family="'Tajawal', 'Arial', sans-serif" font-size="24" fill="rgba(255,255,255,0.5)" text-anchor="middle" direction="rtl">متجر برومبتات الذكاء الاصطناعي للإنتاج الإبداعي</text>

  <!-- Stats pills -->
  <rect x="280" y="450" width="180" height="44" rx="22" fill="rgba(247,183,49,0.08)" stroke="rgba(247,183,49,0.2)" stroke-width="1"/>
  <text x="370" y="477" font-family="'Tajawal', 'Arial', sans-serif" font-size="16" fill="#F7B731" text-anchor="middle" direction="rtl">300+ برومبت</text>

  <rect x="510" y="450" width="180" height="44" rx="22" fill="rgba(247,183,49,0.08)" stroke="rgba(247,183,49,0.2)" stroke-width="1"/>
  <text x="600" y="477" font-family="'Tajawal', 'Arial', sans-serif" font-size="16" fill="#F7B731" text-anchor="middle" direction="rtl">7+ أدوات AI</text>

  <rect x="740" y="450" width="180" height="44" rx="22" fill="rgba(247,183,49,0.08)" stroke="rgba(247,183,49,0.2)" stroke-width="1"/>
  <text x="830" y="477" font-family="'Tajawal', 'Arial', sans-serif" font-size="16" fill="#F7B731" text-anchor="middle" direction="rtl">2000+ عميل</text>

  <!-- URL -->
  <text x="600" y="565" font-family="'Roboto Mono', monospace" font-size="14" fill="rgba(255,255,255,0.28)" text-anchor="middle" letter-spacing="1">animaprompt.vercel.app</text>

  <!-- Decorative dots -->
  <circle cx="80" cy="565" r="3" fill="#F7B731" opacity="0.4"/>
  <circle cx="95" cy="565" r="3" fill="#F7B731" opacity="0.25"/>
  <circle cx="110" cy="565" r="3" fill="#F7B731" opacity="0.15"/>
  <circle cx="1120" cy="565" r="3" fill="#F7B731" opacity="0.4"/>
  <circle cx="1105" cy="565" r="3" fill="#F7B731" opacity="0.25"/>
  <circle cx="1090" cy="565" r="3" fill="#F7B731" opacity="0.15"/>
</svg>
